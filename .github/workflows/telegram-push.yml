name: Telegram Weekly Push

# vault/push/YYYY-Www.md 파일이 추가·변경될 때 자동 실행
# 수동 실행: Actions 탭 → Run workflow → week 입력 (YYYY-Www)
on:
  push:
    branches: [main]
    paths:
      - 'vault/push/*.md'
  workflow_dispatch:
    inputs:
      week:
        description: '발송할 주차 (YYYY-Www). 비워두면 최신 push 파일 자동 감지.'
        required: false
        default: ''

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # HEAD~1 비교에 필요

      - name: Detect week
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            WEEK="${{ github.event.inputs.week }}"
          else
            WEEK=$(git diff --name-only HEAD~1 HEAD \
              | grep -E '^vault/push/[0-9]{4}-W[0-9]{2}\.md$' \
              | sed 's|vault/push/||; s|\.md||' \
              | head -1)
          fi
          echo "week=$WEEK" >> "$GITHUB_OUTPUT"
          echo "Detected week: $WEEK"

      - name: Send Telegram push
        if: steps.detect.outputs.week != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_PAPERRADAR }}
        run: |
          python3 scripts/send_push.py ${{ steps.detect.outputs.week }}
